name: One-shot modal copy patch

on:
  push:
    branches:
      - fix/pricing-plan-feature-gates

permissions:
  contents: write

jobs:
  patch:
    if: contains(github.event.head_commit.message, 'Apply modal copy update')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pricing-plan-feature-gates
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch modal copy and clean up
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/web/src/components/billing/AiAccessGate.tsx')
          text = path.read_text(encoding='utf-8')
          replacements = {
              "? 'Guided AI tools, log brew, scanner history'": "? 'Limited AI Chat, Basic + Advanced Brew, Lite & Pro Brew Guide'",
              ": 'AI Coach, latte art, scan analysis, Deep mode'": ": 'AI Coach, AI Latte Art, scan analysis, Deep mode'",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'target modal copy not found: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/one-shot-modal-copy-patch.yml .github/modal-copy-update.txt
          git add apps/web/src/components/billing/AiAccessGate.tsx
          git diff --cached --quiet && exit 0
          git commit -m "Align upgrade modal plan copy"
          git push origin HEAD:fix/pricing-plan-feature-gates
