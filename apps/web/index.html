<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />

  <!-- iOS PWA / App Store -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-touch-fullscreen" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BaristaChaw" />
  <meta id="theme-color-meta" name="theme-color" content="#F5F8FE" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F5F8FE" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="color-scheme" content="dark light" />
  <style>
    html,
    body,
    #root {
      min-height: 100%;
      background: #F2F2F7;
      color-scheme: light;
    }

    @media (prefers-color-scheme: dark) {

      html:not(.light),
      html:not(.light) body,
      html:not(.light) #root {
        background: #000000;
        color-scheme: dark;
      }
    }
  </style>
  <script>
    (function () {
      try {
        var params = new URLSearchParams(window.location.search);
        var nativeSystemTheme = params.get('theme') === 'system'
          || (params.get('runtime') === 'web_parity' && params.get('ui_profile') === 'native_shell');
        var storedTheme = window.localStorage && window.localStorage.getItem('BARISTA_THEME');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = nativeSystemTheme ? (prefersDark ? 'dark' : 'light') : (storedTheme === 'dark' || storedTheme === 'light' ? storedTheme : (prefersDark ? 'dark' : 'light'));
        document.documentElement.classList.remove('dark', 'light');
        document.documentElement.classList.add(theme);
        document.documentElement.style.backgroundColor = theme === 'dark' ? '#000000' : '#F2F2F7';
        document.documentElement.style.colorScheme = theme;
        var themeMeta = document.getElementById('theme-color-meta');
        if (themeMeta) themeMeta.setAttribute('content', theme === 'dark' ? '#000000' : '#F2F2F7');
      } catch (error) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <!-- Prevent text-size-adjust on rotation -->
  <meta name="format-detection" content="telephone=no" />

  <!-- SEO -->
  <title>Baristachaw - AI Coffee Assistant</title>
  <meta name="description"
    content="Baristachaw - Your AI-powered barista assistant. Scan coffee beans, get expert recipes, and brew like a pro." />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://app.baristachaw.com/" />
  <meta property="og:title" content="Baristachaw - AI Coffee Assistant" />
  <meta property="og:description" content="Your AI-powered barista assistant. Scan coffee beans, get expert recipes, and brew like a pro." />
  <meta property="og:image" content="https://app.baristachaw.com/og-image.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://app.baristachaw.com/" />
  <meta property="twitter:title" content="Baristachaw - AI Coffee Assistant" />
  <meta property="twitter:description" content="Your AI-powered barista assistant. Scan coffee beans, get expert recipes, and brew like a pro." />
  <meta property="twitter:image" content="https://app.baristachaw.com/og-image.png" />

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Baristachaw",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "Web, iOS, Android",
      "description": "Your AI-powered barista assistant. Scan coffee beans, get expert recipes, and brew like a pro.",
      "url": "https://app.baristachaw.com",
      "offers": {
        "@type": "Offer",
        "price": "0"
      }
    }
  </script>

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="48x48" href="/icons/icon-48.png?v=20260430c" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png?v=20260430c" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png?v=20260430c" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png?v=20260430c" />
  <link rel="shortcut icon" href="/favicon.ico?v=20260430c" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png?v=20260430c" />
  <link rel="manifest" href="/manifest.json?v=20260430c" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
